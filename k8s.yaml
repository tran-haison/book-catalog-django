apiVersion: v1
kind: Secret
metadata:
  name: book-catalog-secret
type: Opaque
stringData:
  DJANGO_SECRET_KEY: "change-me"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: book-catalog-config
data:
  DJANGO_DEBUG: "0"
  DJANGO_ALLOWED_HOSTS: "*"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: book-catalog
spec:
  replicas: 1
  selector:
    matchLabels:
      app: book-catalog
  template:
    metadata:
      labels:
        app: book-catalog
    spec:
      containers:
        - name: web
          image: book-catalog:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: book-catalog-config
            - secretRef:
                name: book-catalog-secret
---
apiVersion: v1
kind: Service
metadata:
  name: book-catalog
spec:
  selector:
    app: book-catalog
  ports:
    - name: http
      port: 80
      targetPort: 8000

