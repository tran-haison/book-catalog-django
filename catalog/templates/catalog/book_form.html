{% extends "base.html" %}

{% block title %}{{ form_title }} - Book Catalog{% endblock %}

{% block content %}
  <h1 style="margin-top: 0;">{{ form_title }}</h1>

  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="btn" type="submit">{{ submit_label }}</button>
  </form>

  <div style="height: 12px;"></div>
  <p>
    <a href="{% url 'book_list' %}">Back to list</a>
  </p>
{% endblock %}
